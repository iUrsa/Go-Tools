<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>正态频谱工作室 | 居中峰值 | 全主题 | 完整时长视频</title>
    <style>
        * {
            box-sizing: border-box;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        /* 全局主题变量 (默认暗黑) */
        :root {
            --bg-page: #0b0e1a;
            --bg-panel: rgba(18, 22, 45, 0.85);
            --bg-card: #0f1228;
            --border-light: rgba(255,255,255,0.08);
            --text-primary: #eef3ff;
            --text-secondary: #9da3ca;
            --accent: #8b74ff;
            --btn-bg: #1e213a;
            --shadow: rgba(0,0,0,0.5);
            --canvas-bg: #0a0c18;
        }
        body.light {
            --bg-page: #eef2ff;
            --bg-panel: rgba(245, 245, 255, 0.92);
            --bg-card: #ffffff;
            --border-light: rgba(0,0,0,0.1);
            --text-primary: #1a1f2e;
            --text-secondary: #4f5b7a;
            --accent: #6247e0;
            --btn-bg: #e9e9f0;
            --shadow: rgba(0,0,0,0.1);
            --canvas-bg: #f8faff;
        }

        body {
            background: var(--bg-page);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 30px 20px;
            min-height: 100vh;
        }

        /* 主容器 */
        .app-container {
            max-width: 1550px;
            width: 100%;
            margin: 0 auto;
            background: var(--bg-panel);
            backdrop-filter: blur(5px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px var(--shadow);
            border: 1px solid var(--border-light);
            padding: 24px 30px 34px;
        }

        /* 头部 + 主题切换 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }
        .title-area h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0;
        }
        .title-area p {
            color: var(--text-secondary);
            margin: 5px 0 0;
            font-size: 0.85rem;
        }
        .theme-toggle {
            background: var(--btn-bg);
            border-radius: 60px;
            padding: 8px 18px;
            display: flex;
            gap: 12px;
            align-items: center;
            cursor: pointer;
            border: 1px solid var(--border-light);
            font-weight: 500;
            color: var(--text-primary);
        }
        .theme-toggle span { font-size: 1.2rem; }

        /* 两列布局 */
        .two-columns {
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
        }
        .control-panel {
            flex: 1.2;
            min-width: 310px;
            background: var(--bg-card);
            border-radius: 1.5rem;
            padding: 22px;
            border: 1px solid var(--border-light);
        }
        .preview-area {
            flex: 2;
            min-width: 560px;
            background: var(--canvas-bg);
            border-radius: 1.5rem;
            overflow: hidden;
            border: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
        }

        .setting-group {
            margin-bottom: 1.5rem;
        }
        .setting-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-size: 0.85rem;
        }
        input, select, button {
            background: var(--bg-page);
            border: 1px solid var(--border-light);
            border-radius: 14px;
            padding: 10px 14px;
            color: var(--text-primary);
            font-size: 0.9rem;
            width: 100%;
            outline: none;
        }
        button {
            background: var(--btn-bg);
            cursor: pointer;
            font-weight: 600;
            transition: 0.15s;
        }
        button.primary {
            background: linear-gradient(95deg, var(--accent), #4f3bc2);
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(98, 71, 224, 0.3);
        }
        button.primary:hover { transform: translateY(-2px); filter: brightness(1.05); }
        
        .gradient-colors {
            background: var(--bg-page);
            padding: 12px;
            border-radius: 20px;
        }
        .gradient-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .gradient-row span { width: 45px; font-size: 0.75rem; color: var(--text-secondary);}
        .gradient-row input[type="color"] { width: 50px; height: 36px; padding: 2px; }
        .color-preview { width: 32px; height: 32px; border-radius: 12px; border: 1px solid var(--border-light);}
        
        .opacity-row { display: flex; gap: 12px; align-items: center;}
        .opacity-row input[type="range"] { flex: 2; }
        .opacity-row input[type="number"] { flex: 0.8; min-width: 70px;}

        .resolution-row { display: flex; gap: 10px; flex-wrap: wrap;}
        .resolution-row select { flex: 2; }
        .custom-res { display: flex; gap: 8px; margin-top: 8px; }

        .progress-section {
            margin: 20px 0 12px;
        }
        .progress-bar-bg {
            background: #2a2e48;
            border-radius: 20px;
            height: 10px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: var(--accent);
            transition: width 0.2s;
        }
        .status-text {
            font-size: 0.75rem;
            margin-top: 8px;
            text-align: center;
            color: var(--text-secondary);
        }

        canvas {
            width: 100%;
            height: auto;
            border-radius: 20px;
            background: transparent;
            display: block;
        }
        .preview-label {
            padding: 12px 20px;
            border-top: 1px solid var(--border-light);
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .audio-controls {
            display: flex;
            gap: 14px;
            padding: 16px 20px 22px;
        }
        .badge-icon {
            background: var(--accent);
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            margin-left: 8px;
        }
        hr { border-color: var(--border-light); margin: 18px 0; }
        .download-btn {
            background: #2c7a4d;
            color: white;
            margin-top: 10px;
        }
        .flex-btns { display: flex; gap: 12px; }
        @media (max-width: 1000px) {
            .two-columns { flex-direction: column; }
            .preview-area { min-width: auto; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="title-area">
            <h1>📊 正态频谱引擎 · 居中峰值</h1>
            <p>四色渐变 | 全时长视频 | 正态分布居中最大化 | 透明背景</p>
        </div>
        <div class="theme-toggle" id="themeToggle">
            <span>🌙</span> 明/暗主题
        </div>
    </div>

    <div class="two-columns">
        <!-- 左控制区 -->
        <div class="control-panel">
            <div class="setting-group">
                <label>🎵 导入音频 (自动识别全长)</label>
                <input type="file" id="audioFileInput" accept="audio/*">
                <div id="fileInfo" class="status-text" style="margin-top: 6px;">⚡ 未加载</div>
            </div>

            <div class="setting-group">
                <label>🎨 从左到右 4色渐变</label>
                <div class="gradient-colors">
                    <div class="gradient-row"><span>色1</span><input type="color" id="grad1" value="#6c5ce7"><div class="color-preview"></div></div>
                    <div class="gradient-row"><span>色2</span><input type="color" id="grad2" value="#00cec9"><div class="color-preview"></div></div>
                    <div class="gradient-row"><span>色3</span><input type="color" id="grad3" value="#fdcb6e"><div class="color-preview"></div></div>
                    <div class="gradient-row"><span>色4</span><input type="color" id="grad4" value="#ff7675"><div class="color-preview"></div></div>
                </div>
            </div>

            <div class="setting-group">
                <label>📊 频谱条数 & 正态居中强度</label>
                <select id="barCountSelect">
                    <option value="48">48 条</option>
                    <option value="64">64 条</option>
                    <option value="96" selected>96 条 (推荐)</option>
                    <option value="128">128 条</option>
                </select>
                <div style="font-size: 0.7rem; margin-top: 5px;">✨ 中间条形最高 → 向两侧平滑衰减 (正态曲线映射)</div>
            </div>

            <div class="setting-group">
                <label>📐 导出视频分辨率</label>
                <div class="resolution-row">
                    <select id="resolutionSelect">
                        <option value="1920x1080">1080p (1920x1080)</option>
                        <option value="1280x720" selected>720p (1280x720)</option>
                        <option value="854x480">480p (854x480)</option>
                        <option value="1080x1080">方形 1080x1080</option>
                        <option value="720x720">方形 720x720</option>
                    </select>
                </div>
            </div>

            <div class="setting-group">
                <label>🌫️ 背景不透明度 (0透明~100实黑)</label>
                <div class="opacity-row">
                    <input type="range" id="bgOpacitySlider" min="0" max="100" step="1" value="0">
                    <input type="number" id="bgOpacityNumber" min="0" max="100" step="1" value="0">
                </div>
            </div>

            <div class="setting-group">
                <label>✨ 特效</label>
                <div style="display: flex; gap: 20px;">
                    <label><input type="checkbox" id="peakLine" checked> 峰值线</label>
                    <label><input type="checkbox" id="glowEffect"> 发光边缘</label>
                </div>
            </div>
            <hr>
            <div class="setting-group">
                <button id="generateVideoBtn" class="primary">🎬 生成完整时长视频</button>
                <div id="progressArea" class="progress-section">
                    <div class="progress-bar-bg"><div id="progressFill" class="progress-fill"></div></div>
                    <div id="progressStatus" class="status-text">准备就绪</div>
                </div>
                <div id="downloadContainer" style="display: none;">
                    <button id="downloadVideoBtn" class="download-btn">⬇️ 下载视频 (WEBM)</button>
                    <div class="status-text">✅ 渲染完成，点击下载保存</div>
                </div>
            </div>
        </div>

        <!-- 右侧预览区 -->
        <div class="preview-area">
            <div style="padding: 20px;">
                <canvas id="spectrumCanvas" width="900" height="340" style="width:100%; background: transparent;"></canvas>
            </div>
            <div class="preview-label">🎧 实时预览：正态居中频谱 (峰值居中) | 颜色渐变 | 透明度实时</div>
            <div class="audio-controls">
                <button id="playBtn">▶ 播放</button>
                <button id="pauseBtn">⏸️ 暂停</button>
                <button id="stopBtn">⏹️ 停止</button>
            </div>
        </div>
    </div>
</div>

<script>
    (function(){
        // ----- DOM -----
        const audioFile = document.getElementById('audioFileInput');
        const fileInfo = document.getElementById('fileInfo');
        const barSelect = document.getElementById('barCountSelect');
        const grad1 = document.getElementById('grad1'), grad2 = document.getElementById('grad2'), grad3 = document.getElementById('grad3'), grad4 = document.getElementById('grad4');
        const bgSlider = document.getElementById('bgOpacitySlider'), bgNumber = document.getElementById('bgOpacityNumber');
        const peakCheck = document.getElementById('peakLine'), glowCheck = document.getElementById('glowEffect');
        const generateBtn = document.getElementById('generateVideoBtn');
        const progressFill = document.getElementById('progressFill');
        const progressStatus = document.getElementById('progressStatus');
        const downloadContainer = document.getElementById('downloadContainer');
        const downloadBtn = document.getElementById('downloadVideoBtn');
        const resolutionSelect = document.getElementById('resolutionSelect');
        const themeToggle = document.getElementById('themeToggle');
        const canvas = document.getElementById('spectrumCanvas');
        const ctx = canvas.getContext('2d');
        const playBtn = document.getElementById('playBtn'), pauseBtn = document.getElementById('pauseBtn'), stopBtn = document.getElementById('stopBtn');
        
        // 全局音频变量
        let audioCtx = null, audioBuffer = null, source = null, analyser = null;
        let isPlaying = false, pausedAt = 0;
        let animId = null;
        let freqArray = new Uint8Array(128);
        let barCount = 96;
        let peakHeights = [];
        
        // 正态居中映射权重（预先计算每个bar索引对应的高度乘数，中心最大）
        let normWeights = [];
        function updateNormWeights(count) {
            normWeights = [];
            const mid = (count-1)/2;
            const sigma = count / 5.5;  // 控制衰减速度，使中间突出明显
            for(let i=0; i<count; i++) {
                let x = (i - mid) / sigma;
                let weight = Math.exp(-x*x / 2);  // 高斯钟形曲线
                normWeights.push(weight);
            }
            // 最大权重归一化至1.0倍（让原始值最高映射1:1，但比旁边强）
            const maxW = Math.max(...normWeights);
            for(let i=0; i<count; i++) normWeights[i] /= maxW;
        }
        
        // 四色渐变函数
        function getGradientColor(ratio) {
            const colors = [grad1.value, grad2.value, grad3.value, grad4.value];
            if(ratio<=0) return colors[0];
            if(ratio>=1) return colors[3];
            const seg = 1/3;
            let idx = 0, local = ratio;
            if(ratio<=seg) { idx=0; local=ratio/seg; }
            else if(ratio<=seg*2) { idx=1; local=(ratio-seg)/seg; }
            else { idx=2; local=(ratio-seg*2)/seg; }
            const c1 = hexToRgb(colors[idx]), c2 = hexToRgb(colors[idx+1]);
            const r = Math.round(c1.r + (c2.r-c1.r)*local);
            const g = Math.round(c1.g + (c2.g-c1.g)*local);
            const b = Math.round(c1.b + (c2.b-c1.b)*local);
            return `rgb(${r},${g},${b})`;
        }
        function hexToRgb(hex) {
            let h = hex.slice(1);
            if(h.length===3) h=h.split('').map(c=>c+c).join('');
            const intVal = parseInt(h,16);
            return {r:(intVal>>16)&255, g:(intVal>>8)&255, b:intVal&255};
        }
        
        // 绘制核心（应用正态权重，中间最高）
        function drawSpectrum() {
            if(!ctx) return;
            const w = canvas.width, h = canvas.height;
            const bgOp = parseInt(bgSlider.value)/100;
            if(bgOp>0) { ctx.fillStyle = `rgba(0,0,0,${bgOp})`; ctx.fillRect(0,0,w,h); }
            else ctx.clearRect(0,0,w,h);
            if(!analyser) { ctx.fillStyle="#aaa"; ctx.fillText("等待音频...",20,50); return; }
            let rawData = new Uint8Array(analyser.frequencyBinCount);
            if(isPlaying) analyser.getByteFrequencyData(rawData);
            else rawData.fill(0);
            const validBins = Math.min(rawData.length, barCount);
            // 对每个条柱，先取原始幅度，再×正态权重
            const barWidth = w / barCount;
            const glow = glowCheck.checked;
            for(let i=0; i<barCount; i++) {
                let rawVal = 0;
                if(i < validBins) rawVal = rawData[i];
                let normFactor = normWeights[i] || 1.0;
                let shapedVal = rawVal * normFactor;
                shapedVal = Math.min(255, shapedVal);
                let percent = shapedVal / 255;
                let barHeight = percent * (h - 28);
                let x = i * barWidth;
                let y = h - barHeight;
                let colorRatio = i / barCount;
                let fillColor = getGradientColor(colorRatio);
                if(glow) { ctx.shadowBlur = 8; ctx.shadowColor = `rgba(255,200,80,0.6)`; }
                else ctx.shadowBlur = 0;
                ctx.fillStyle = fillColor;
                ctx.fillRect(x, y, Math.max(1.5, barWidth - 1.2), barHeight);
                // 峰值线
                if(peakCheck.checked) {
                    if(shapedVal > peakHeights[i]) peakHeights[i] = shapedVal;
                    else peakHeights[i] = peakHeights[i] * 0.94;
                    let peakPercent = peakHeights[i]/255;
                    let peakY = h - peakPercent * (h-28);
                    ctx.fillStyle = "#fff7b0";
                    ctx.fillRect(x, peakY-2, barWidth-1.2, 3);
                }
            }
            ctx.shadowBlur = 0;
        }
        
        function animatePreview() {
            if(animId) cancelAnimationFrame(animId);
            function frame() { drawSpectrum(); animId = requestAnimationFrame(frame); }
            frame();
        }
        
        // 音频加载
        async function loadAudio(file) {
            if(!file) return;
            fileInfo.innerText = `加载中 ${file.name}`;
            if(audioCtx && audioCtx.state !== 'closed') await audioCtx.close();
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const buf = await file.arrayBuffer();
            audioBuffer = await audioCtx.decodeAudioData(buf);
            analyser = audioCtx.createAnalyser();
            updateBarCount();
            analyser.connect(audioCtx.destination);
            fileInfo.innerText = `✅ ${file.name} (${audioBuffer.duration.toFixed(1)}秒)`;
            stopAudio();
            drawSpectrum();
        }
        audioFile.addEventListener('change', e => { if(e.target.files[0]) loadAudio(e.target.files[0]); });
        
        function updateBarCount() {
            barCount = parseInt(barSelect.value);
            if(analyser) {
                let fft = Math.max(64, Math.pow(2, Math.ceil(Math.log2(barCount*2))));
                analyser.fftSize = fft;
                freqArray = new Uint8Array(analyser.frequencyBinCount);
                peakHeights = new Array(barCount).fill(0);
            }
            updateNormWeights(barCount);
            drawSpectrum();
        }
        barSelect.addEventListener('change', () => { updateBarCount(); if(!isPlaying) drawSpectrum(); });
        
        async function playAudio() {
            if(!audioBuffer || !audioCtx) { fileInfo.innerText="请先导入音频"; return; }
            if(isPlaying) return;
            if(audioCtx.state === 'suspended') await audioCtx.resume();
            if(source) try{ source.stop(); }catch(e){}
            source = audioCtx.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            source.start(0, pausedAt);
            isPlaying = true;
            source.onended = () => { isPlaying=false; pausedAt=0; drawSpectrum(); };
        }
        function pauseAudio() { if(isPlaying && source) { pausedAt = audioCtx.currentTime - (source.startedTime||0); source.stop(); isPlaying=false; } }
        function stopAudio() { if(source){ try{ source.stop(); }catch(e){} source=null; } isPlaying=false; pausedAt=0; drawSpectrum(); }
        playBtn.onclick = playAudio; pauseBtn.onclick = pauseAudio; stopBtn.onclick = stopAudio;
        
        // 背景透明度联动
        function syncBg(v){ bgSlider.value=v; bgNumber.value=v; drawSpectrum(); }
        bgSlider.addEventListener('input', e=>syncBg(e.target.value));
        bgNumber.addEventListener('input', e=>syncBg(e.target.value));
        
        // 实时重绘
        [grad1,grad2,grad3,grad4, peakCheck, glowCheck].forEach(el => el.addEventListener('input', ()=>drawSpectrum()));
        
        // ---------- 全时长视频导出 + 进度条 + 正态居中 + 手动下载 + 分辨率自定义 ----------
        let recordedBlob = null;
        async function generateFullVideo() {
            if(!audioBuffer){ progressStatus.innerText="❌ 未导入音频"; return; }
            if(isPlaying) pauseAudio();
            downloadContainer.style.display = "none";
            recordedBlob = null;
            progressFill.style.width = "0%";
            progressStatus.innerText = "⏳ 正在初始化渲染...";
            const durationSec = audioBuffer.duration;
            const resStr = resolutionSelect.value;
            const [outW, outH] = resStr.split('x').map(Number);
            const videoWidth = outW, videoHeight = outH;
            // 离屏canvas
            const offCanvas = document.createElement('canvas');
            offCanvas.width = videoWidth;
            offCanvas.height = videoHeight;
            const offCtx = offCanvas.getContext('2d');
            // 独立录音环境
            const recordCtx = new (window.AudioContext || window.webkitAudioContext)();
            const bufferSrc = recordCtx.createBufferSource();
            bufferSrc.buffer = audioBuffer;
            const recAnalyser = recordCtx.createAnalyser();
            recAnalyser.fftSize = Math.max(256, barCount*2);
            bufferSrc.connect(recAnalyser);
            recAnalyser.connect(recordCtx.destination);
            const recFreq = new Uint8Array(recAnalyser.frequencyBinCount);
            let recPeaks = new Array(barCount).fill(0);
            // 准备正态权重
            const weightsCopy = [...normWeights];
            bufferSrc.start(0);
            recordCtx.resume();
            
            const stream = offCanvas.captureStream(30);
            const mediaRec = new MediaRecorder(stream, { mimeType: 'video/webm' });
            let chunks = [];
            mediaRec.ondataavailable = e => { if(e.data.size) chunks.push(e.data); };
            let finalize = false;
            mediaRec.onstop = () => {
                recordedBlob = new Blob(chunks, { type: 'video/webm' });
                progressStatus.innerText = "✅ 视频渲染完成！点击下载按钮保存";
                progressFill.style.width = "100%";
                downloadContainer.style.display = "block";
                bufferSrc.stop();
                recordCtx.close();
                isRecordingActive = false;
                if(recAnim) cancelAnimationFrame(recAnim);
            };
            mediaRec.start(100);
            let isRecordingActive = true;
            let recAnim = null;
            const startTime = performance.now();
            const totalMs = durationSec * 1000;
            let lastProgress = 0;
            
            function renderFrame() {
                if(!isRecordingActive) return;
                const now = performance.now() - startTime;
                if(now >= totalMs) {
                    if(mediaRec.state === 'recording') mediaRec.stop();
                    cancelAnimationFrame(recAnim);
                    isRecordingActive = false;
                    return;
                }
                // 进度更新
                const percent = Math.min(100, (now / totalMs) * 100);
                if(percent - lastProgress >= 1) {
                    progressFill.style.width = percent + "%";
                    progressStatus.innerText = `🎬 渲染中 ${Math.floor(percent)}%`;
                    lastProgress = percent;
                }
                recAnalyser.getByteFrequencyData(recFreq);
                const bgOp = parseInt(bgSlider.value)/100;
                if(bgOp>0) { offCtx.fillStyle = `rgba(0,0,0,${bgOp})`; offCtx.fillRect(0,0,videoWidth,videoHeight); }
                else offCtx.clearRect(0,0,videoWidth,videoHeight);
                const curBars = barCount;
                const barW = videoWidth / curBars;
                const glowOn = glowCheck.checked;
                const peakOn = peakCheck.checked;
                for(let i=0; i<curBars; i++) {
                    let rawVal = (i < recFreq.length) ? recFreq[i] : 0;
                    let weight = weightsCopy[i] || 1.0;
                    let shaped = Math.min(255, rawVal * weight);
                    let percentH = shaped/255;
                    let barH = percentH * (videoHeight - 40);
                    let x = i * barW;
                    let y = videoHeight - barH;
                    let ratioColor = i/curBars;
                    let color = getGradientColor(ratioColor);
                    if(glowOn) { offCtx.shadowBlur = 8; offCtx.shadowColor = "rgba(255,220,100,0.7)"; }
                    else offCtx.shadowBlur = 0;
                    offCtx.fillStyle = color;
                    offCtx.fillRect(x, y, Math.max(2, barW-1.2), barH);
                    if(peakOn) {
                        if(shaped > recPeaks[i]) recPeaks[i] = shaped;
                        else recPeaks[i] = recPeaks[i] * 0.94;
                        let peakY = videoHeight - (recPeaks[i]/255)*(videoHeight-40);
                        offCtx.fillStyle = "#ffffc0";
                        offCtx.fillRect(x, peakY-2, barW-1.2, 3);
                    }
                }
                offCtx.shadowBlur = 0;
                recAnim = requestAnimationFrame(renderFrame);
            }
            renderFrame();
            // 超时后备
            setTimeout(()=>{ if(mediaRec.state === 'recording') mediaRec.stop(); }, totalMs + 500);
        }
        
        generateBtn.addEventListener('click', generateFullVideo);
        downloadBtn.addEventListener('click', ()=>{
            if(recordedBlob) {
                const url = URL.createObjectURL(recordedBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `spectrum_centerpeak_${Date.now()}.webm`;
                a.click();
                URL.revokeObjectURL(url);
                progressStatus.innerText = "⏬ 已开始下载";
            } else { progressStatus.innerText = "请先生成视频"; }
        });
        
        // 主题切换
        let isDark = true;
        themeToggle.addEventListener('click', () => {
            isDark = !isDark;
            if(isDark) { document.body.classList.remove('light'); themeToggle.innerHTML = '<span>🌙</span> 明/暗主题'; }
            else { document.body.classList.add('light'); themeToggle.innerHTML = '<span>☀️</span> 明/暗主题'; }
        });
        
        // 初始化
        canvas.width = 900; canvas.height = 340;
        updateBarCount();
        animatePreview();
        drawSpectrum();
    })();
</script>
</body>
</html>
